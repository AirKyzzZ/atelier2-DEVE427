name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

  NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL || 'http://localhost:3000' }}
  NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci_fake_secret_thirty_two_chars_xx' }}
  GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID || 'ci_fake_client_id' }}
  GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET || 'ci_fake_client_secret_value' }}
  GITHUB_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN || 'ghp_ci_fake_access_token_value_xxx' }}
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'mysql://taxonomy:taxonomy@127.0.0.1:3306/taxonomy_ci' }}
  SMTP_FROM: ${{ secrets.SMTP_FROM || 'ci@taxonomy.local' }}
  POSTMARK_API_TOKEN: ${{ secrets.POSTMARK_API_TOKEN || 'ci-fake-postmark-token' }}
  POSTMARK_SIGN_IN_TEMPLATE: ${{ secrets.POSTMARK_SIGN_IN_TEMPLATE || '12345' }}
  POSTMARK_ACTIVATION_TEMPLATE: ${{ secrets.POSTMARK_ACTIVATION_TEMPLATE || '67890' }}
  STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY || 'sk_test_ci_fake_stripe_key_value' }}
  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_ci_fake_webhook_secret_value' }}
  STRIPE_PRO_MONTHLY_PLAN_ID: ${{ secrets.STRIPE_PRO_MONTHLY_PLAN_ID || 'price_ci_fake_plan_id' }}
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: next lint
        run: pnpm lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: tsc --noEmit
        run: pnpm typecheck

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: Generate Prisma client
        run: pnpm prisma generate
      - name: Build (contentlayer + next build)
        run: pnpm build

  playwright:
    name: Playwright e2e
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [lint]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: taxonomy_ci
          MYSQL_USER: taxonomy
          MYSQL_PASSWORD: taxonomy
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ptaxonomy"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist
      - name: Wait for MySQL ready
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u taxonomy -ptaxonomy --silent; then
              echo "MySQL is up"; exit 0
            fi
            echo "MySQL not ready (attempt $i)"; sleep 2
          done
          exit 1
      - name: Apply Prisma schema
        run: pnpm prisma db push --skip-generate --accept-data-loss
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright suite
        run: pnpm exec playwright test --reporter=list,html
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  sonarqube:
    name: SonarQube (Docker)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [lint]
    services:
      sonarqube:
        image: sonarqube:lts-community
        ports:
          - 9000:9000
        options: >-
          --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:9000/api/system/status"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=40
          --health-start-period=120s
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for SonarQube to be UP
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s http://localhost:9000/api/system/status | python3 -c "import sys,json;print(json.load(sys.stdin).get('status','?'))" 2>/dev/null || echo "DOWN")
            echo "[$i] Sonar status: $STATUS"
            if [ "$STATUS" = "UP" ]; then exit 0; fi
            sleep 5
          done
          echo "SonarQube failed to become UP" >&2
          exit 1

      - name: Change default admin password
        run: |
          curl -s -u admin:admin -X POST \
            "http://localhost:9000/api/users/change_password?login=admin&password=ci-admin-pass&previousPassword=admin" \
            -o /dev/null -w "change_password HTTP %{http_code}\n"

      - name: Create scanner token
        id: sonar-token
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          TOKEN=$(curl -s -u admin:ci-admin-pass -X POST \
            "http://localhost:9000/api/user_tokens/generate?name=ci-${RUN_ID}" \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ steps.sonar-token.outputs.token }}
          SONAR_HOST_URL: http://localhost:9000

      - name: Quality Gate check
        env:
          SONAR_USER_PASS: admin:ci-admin-pass
          SONAR_BASE: http://localhost:9000
        run: |
          REPORT_FILE=.scannerwork/report-task.txt
          if [ ! -f "$REPORT_FILE" ]; then
            echo "scanner did not produce $REPORT_FILE" >&2
            exit 1
          fi
          CE_TASK_URL=$(grep ceTaskUrl= "$REPORT_FILE" | cut -d= -f2-)
          echo "Polling $CE_TASK_URL"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -u "$SONAR_USER_PASS" "$CE_TASK_URL" | python3 -c "import sys,json;print(json.load(sys.stdin)['task']['status'])")
            echo "[$i] CE task: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELED" ]; then exit 1; fi
            sleep 5
          done
          ANALYSIS_ID=$(curl -s -u "$SONAR_USER_PASS" "$CE_TASK_URL" | python3 -c "import sys,json;print(json.load(sys.stdin)['task']['analysisId'])")
          QG=$(curl -s -u "$SONAR_USER_PASS" "$SONAR_BASE/api/qualitygates/project_status?analysisId=$ANALYSIS_ID" | python3 -c "import sys,json;print(json.load(sys.stdin)['projectStatus']['status'])")
          echo "Quality Gate: $QG"
          if [ "$QG" != "OK" ]; then
            echo "Quality Gate failed" >&2
            exit 1
          fi
