# SonarQube project configuration for taxonomy fork (DEVE427 Atelier 2)
# Used by `sonar-scanner` both locally (against `localhost:9000`) and in CI
# (against the SonarQube service container — see .github/workflows/ci.yml).

sonar.projectKey=taxonomy
sonar.projectName=taxonomy
sonar.projectVersion=0.2.0

# What to scan: app source + the small infrastructure files at the repo root.
sonar.sources=app,components,lib,types,hooks,actions,middleware.ts,env.mjs,contentlayer.config.js,next.config.mjs

# Test sources (Playwright e2e). Sonar reads them differently from product code.
sonar.tests=tests
sonar.test.inclusions=**/*.spec.ts

# Avoid scanning generated / vendored content.
sonar.exclusions=**/node_modules/**,**/.next/**,**/build/**,**/.contentlayer/**,**/playwright-report/**,**/test-results/**,**/.scannerwork/**,presentation/**,docs/**

sonar.sourceEncoding=UTF-8
